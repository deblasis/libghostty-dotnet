name: Visual Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  visual-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0  # Must match the version compatible with libghostty pinned commit

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Build libghostty
        run: ./setup.ps1

      - name: Build all examples
        run: just build-all

      - name: Run smoke tests
        run: just ci-test-smoke

      - name: Run full visual tests
        run: just ci-test-visual

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 14
